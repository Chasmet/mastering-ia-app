<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mastering IA App</title>
  <style>
    :root {
      --bg: #0b0f14;
      --card: #121821;
      --text: #f5f7fb;
      --muted: #9aa4b2;
      --accent: #4f8cff;
      --border: #223043;
      --success: #1f9d55;
      --danger: #dc2626;
    }

    body.light {
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #101828;
      --muted: #667085;
      --accent: #2563eb;
      --border: #d0d5dd;
      --success: #16a34a;
      --danger: #dc2626;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .app {
      max-width: 680px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .topbar, .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      font-size: 1.3rem;
    }

    h2 {
      font-size: 1.05rem;
    }

    .sub {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 4px;
    }

    .theme-btn, .main-btn, .secondary-btn, .file-label {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
    }

    .theme-btn {
      width: auto;
      background: var(--accent);
      color: white;
      font-weight: bold;
    }

    .main-btn {
      background: var(--accent);
      color: white;
      font-weight: bold;
    }

    .secondary-btn, .file-label {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .file-input {
      display: none;
    }

    .row {
      display: grid;
      gap: 10px;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      font-size: 1rem;
      resize: vertical;
    }

    .status {
      padding: 12px;
      border-radius: 14px;
      background: rgba(79, 140, 255, 0.12);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.95rem;
      white-space: pre-wrap;
      line-height: 1.4;
    }

    .status.success {
      background: rgba(31, 157, 85, 0.14);
    }

    .status.error {
      background: rgba(220, 38, 38, 0.14);
      border-color: rgba(220, 38, 38, 0.35);
    }

    .small {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .audio-box {
      display: grid;
      gap: 10px;
    }

    audio {
      width: 100%;
    }

    .result-box {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: transparent;
      white-space: pre-wrap;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .download-box {
      display: none;
      gap: 10px;
    }

    .download-link {
      display: inline-block;
      text-decoration: none;
      text-align: center;
      background: var(--accent);
      color: white;
      padding: 14px 16px;
      border-radius: 14px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <h1>Mastering IA</h1>
        <p class="sub">Application mobile sombre / clair</p>
      </div>
      <button id="themeToggle" class="theme-btn">Mode clair</button>
    </div>

    <div class="card row">
      <h2>Importer un morceau</h2>
      <label class="file-label" for="audioFile">Choisir un fichier audio</label>
      <input id="audioFile" class="file-input" type="file" accept="audio/*" />
      <p id="fileName" class="small">Aucun fichier sélectionné</p>

      <div id="audioBox" class="audio-box" style="display:none;">
        <audio id="audioPreview" controls></audio>
      </div>
    </div>

    <div class="card row">
      <h2>Instruction</h2>
      <textarea id="promptInput">Rends ce son parfait. Je veux un rendu propre, puissant, équilibré et professionnel.</textarea>
      <button id="analyzeBtn" class="main-btn">Analyser et préparer le mastering</button>
      <button id="masterBtn" class="secondary-btn">Lancer la masterisation</button>
    </div>

    <div class="card row">
      <h2>Statut</h2>
      <div id="statusBox" class="status">En attente d’un fichier audio.</div>
    </div>

    <div class="card row">
      <h2>Résultat analyse / plan</h2>
      <div id="resultBox" class="result-box">Aucun résultat pour le moment.</div>
    </div>

    <div class="card row download-box" id="downloadBox">
      <h2>Téléchargement</h2>
      <a id="downloadLink" class="download-link" href="#" download>Télécharger le master</a>
      <p class="small" id="downloadInfo"></p>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://mastering-ia-app.onrender.com";

    const body = document.body;
    const themeToggle = document.getElementById("themeToggle");
    const audioFile = document.getElementById("audioFile");
    const fileName = document.getElementById("fileName");
    const audioPreview = document.getElementById("audioPreview");
    const audioBox = document.getElementById("audioBox");
    const statusBox = document.getElementById("statusBox");
    const resultBox = document.getElementById("resultBox");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const masterBtn = document.getElementById("masterBtn");
    const promptInput = document.getElementById("promptInput");
    const downloadBox = document.getElementById("downloadBox");
    const downloadLink = document.getElementById("downloadLink");
    const downloadInfo = document.getElementById("downloadInfo");

    let lastAnalysis = null;
    let lastPlanText = "";

    const savedTheme = localStorage.getItem("mastering-theme");
    if (savedTheme === "light") {
      body.classList.add("light");
      themeToggle.textContent = "Mode sombre";
    }

    themeToggle.addEventListener("click", () => {
      body.classList.toggle("light");
      const isLight = body.classList.contains("light");
      localStorage.setItem("mastering-theme", isLight ? "light" : "dark");
      themeToggle.textContent = isLight ? "Mode sombre" : "Mode clair";
    });

    audioFile.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;

      fileName.textContent = file.name;
      audioPreview.src = URL.createObjectURL(file);
      audioBox.style.display = "grid";
      statusBox.textContent = "Fichier chargé. Prêt pour l’analyse.";
      statusBox.className = "status success";
      resultBox.textContent = "Aucun résultat pour le moment.";
      downloadBox.style.display = "none";
      downloadLink.href = "#";
      downloadInfo.textContent = "";
      lastAnalysis = null;
      lastPlanText = "";
    });

    analyzeBtn.addEventListener("click", async () => {
      try {
        const file = audioFile.files[0];

        if (!file) {
          statusBox.textContent = "Ajoute d’abord un fichier audio.";
          statusBox.className = "status error";
          return;
        }

        statusBox.textContent = "Envoi du fichier au backend et analyse en cours...";
        statusBox.className = "status";

        const formData = new FormData();
        formData.append("audio", file);

        const analyzeResponse = await fetch(`${BACKEND_URL}/api/analyze`, {
          method: "POST",
          body: formData
        });

        const analyzeData = await analyzeResponse.json();

        if (!analyzeData.ok) {
          throw new Error(analyzeData.error || "Erreur analyse");
        }

        lastAnalysis = analyzeData.analysis;

        statusBox.textContent = "Analyse terminée. Préparation du plan de mastering IA...";
        statusBox.className = "status success";

        const planResponse = await fetch(`${BACKEND_URL}/api/mastering-plan`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            userPrompt: promptInput.value,
            analysis: lastAnalysis
          })
        });

        const planData = await planResponse.json();

        if (!planData.ok) {
          throw new Error(planData.error || "Erreur plan mastering");
        }

        lastPlanText = planData.result || "";

        resultBox.textContent =
          "Analyse :\n" +
          JSON.stringify(lastAnalysis, null, 2) +
          "\n\nPlan IA :\n" +
          lastPlanText;

        statusBox.textContent = "Analyse et plan de mastering générés avec succès.";
        statusBox.className = "status success";
      } catch (error) {
        statusBox.textContent = "Erreur : " + error.message;
        statusBox.className = "status error";
      }
    });

    masterBtn.addEventListener("click", async () => {
      try {
        const file = audioFile.files[0];

        if (!file) {
          statusBox.textContent = "Ajoute d’abord un fichier audio.";
          statusBox.className = "status error";
          return;
        }

        if (!lastAnalysis) {
          statusBox.textContent = "Lance d’abord l’analyse avant la masterisation.";
          statusBox.className = "status error";
          return;
        }

        statusBox.textContent = "Masterisation réelle en cours... cela peut prendre un peu de temps.";
        statusBox.className = "status";

        downloadBox.style.display = "none";
        downloadLink.href = "#";
        downloadInfo.textContent = "";

        const formData = new FormData();
        formData.append("audio", file);
        formData.append("userPrompt", promptInput.value);
        formData.append("analysis", JSON.stringify(lastAnalysis));

        const response = await fetch(`${BACKEND_URL}/api/master`, {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          let errorMessage = "Erreur masterisation";
          try {
            const errorData = await response.json();
            errorMessage = errorData.error || errorMessage;
          } catch {
          }
          throw new Error(errorMessage);
        }

        const blob = await response.blob();
        const planHeader = response.headers.get("X-Mastering-Plan");
        const planText = planHeader ? decodeURIComponent(planHeader) : lastPlanText;

        const url = URL.createObjectURL(blob);
        const originalName = file.name.replace(/\.[^/.]+$/, "");
        const finalName = `${originalName}_master.wav`;

        downloadLink.href = url;
        downloadLink.download = finalName;
        downloadInfo.textContent = `Fichier prêt : ${finalName}`;
        downloadBox.style.display = "grid";

        resultBox.textContent =
          "Analyse :\n" +
          JSON.stringify(lastAnalysis, null, 2) +
          "\n\nPlan IA utilisé :\n" +
          (planText || "Aucun plan reçu");

        statusBox.textContent = "Masterisation terminée. Télécharge ton fichier masterisé.";
        statusBox.className = "status success";
      } catch (error) {
        statusBox.textContent = "Erreur : " + error.message;
        statusBox.className = "status error";
      }
    });
  </script>
</body>
</html>
